substitutions:
  device_name: "plane-radar"
  friendly_name: "Plane Radar"
  default_lat: "53.743"     # Stockholm Sweden,change or set live via HA/web UI
  default_lon: "9.953"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 200
    then:
      - lambda: |-
          // ================= AIRPORT DATA — REPLACEABLE BLOCK =================
          // Each airport: one push_back to rw_icao (its ICAO label) and one
          // matching push_back to rw_lines holding its runway endpoint coords,
          // flattened as {lat1,lon1,lat2,lon2, ...} (4 numbers per runway).
          //
          // To regenerate for a different location, run build_airports.py and
          // paste its output over everything between the two === markers.
          // Coordinates are WGS84 decimal degrees.
          // ===================================================================
          // Airports within 150 km of (53.7430, 9.9530). Generated by build_airports.py.
          id(rw_icao).push_back("EDDH");
          id(rw_lines).push_back({
            53.654400, 9.975210, 53.625099, 10.000500,   // 15/33
            53.618301, 9.963710, 53.637100, 10.001800   // 05/23
          });

          id(rw_icao).push_back("EDHI");
          id(rw_lines).push_back({
            53.524924, 9.813482, 53.542668, 9.851122   // 05/23
          });

          id(rw_icao).push_back("EDHL");
          id(rw_lines).push_back({
            53.801899, 10.701600, 53.807774, 10.731939   // 07/25
          });

          id(rw_icao).push_back("ETNH");
          id(rw_lines).push_back({
            54.310200, 9.519740, 54.314201, 9.556590   // 08/26
          });

          id(rw_icao).push_back("EDHK");
          id(rw_lines).push_back({
            54.378700, 10.135600, 54.380299, 10.154800,   // 08/26
            54.381001, 10.140800, 54.381699, 10.147500   // 08L/26R
          });

          id(rw_icao).push_back("ETNS");
          id(rw_lines).push_back({
            54.452000, 9.502500, 54.466702, 9.530330,   // 05/23
            54.455299, 9.502500, 54.460499, 9.532000   // 07/25
          });

          id(rw_icao).push_back("ETMN");
          id(rw_lines).push_back({
            53.765400, 8.640390, 53.769901, 8.676610   // 08/26
          });

          id(rw_icao).push_back("ETHS");
          id(rw_lines).push_back({
            52.919498, 10.165700, 52.919201, 10.202000,   // 09/27
            52.919800, 10.178600, 52.920101, 10.193800,   // 09L/27R
            52.912300, 10.191400, 52.914001, 10.197200   // 06/24
          });

          id(rw_icao).push_back("EDDW");
          id(rw_lines).push_back({
            53.046479, 8.770064, 53.047370, 8.809341,   // 09/27
            53.042599, 8.784240, 53.046501, 8.792400   // 05/23
          });

          id(rw_icao).push_back("ETHC");
          id(rw_lines).push_back({
            52.589901, 10.008800, 52.592499, 10.035500   // 08/26
          });

          id(rw_icao).push_back("EKSB");
          id(rw_lines).push_back({
            54.969002, 9.784890, 54.956699, 9.803160   // 14/32
          });

          id(rw_icao).push_back("EDDV");
          id(rw_lines).push_back({
            52.468377, 9.648273, 52.466827, 9.704151,   // 09L/27R
            52.455002, 9.676770, 52.453999, 9.711150,   // 09R/27L
            52.464829, 9.683748, 52.464514, 9.695206   // 09C/27C
          });

          id(rw_icao).push_back("EKMB");
          id(rw_lines).push_back({
            54.700100, 11.429200, 54.698799, 11.447700   // 09/27
          });

          id(rw_icao).push_back("ETNW");
          id(rw_lines).push_back({
            52.456341, 9.416230, 52.459000, 9.445700,   // 08/26
            52.445000, 9.427000, 52.458698, 9.438330,   // 02/20
            52.454800, 9.416330, 52.456299, 9.432170   // 08R/26L
          });

          // =============== END AIRPORT DATA — REPLACEABLE BLOCK ==============
esp32:
  variant: esp32c3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "asdasdasdasdasdasdasdasdasd"   # use the one created by your framework

ota:
  platform: esphome

mqtt:
  id: mqtt_client
  client_id: ${device_name}
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_password
  discovery: false
  topic_prefix: 'esphome/${device_name}'
  discovery_prefix: 'nonexistent_discovery_topic'
  log_topic:
    topic: null
    level: NONE

# --- Wi-Fi using credentials from ESPHome's secrets.yaml (Home Assistant add-on) ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  version: 3

http_request:
  useragent: esphome-plane-radar/1.0
  timeout: 10s

time:
  - platform: sntp
    id: sntp_time

# ---------------------------------------------------------------------
# Persisted settings (replaces the "planeradar" NVS namespace).
# Editable from Home Assistant, or from the built-in web_server dashboard
# at http://plane-radar.local, or straight from the ESPHome API.
# ---------------------------------------------------------------------
number:
  # Enter the compass heading you are facing (from e.g. the iPhone Compass
  # app) and the firmware rotates the radar so that direction is at the top
  # of the display. Rotation applied on screen = (360 - facing) mod 360.
  # Example: facing 240 (SW) -> screen rotation 120.
  - platform: template
    name: "Facing Direction"
    id: facing_direction
    min_value: 0
    max_value: 359
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true
    entity_category: config
    unit_of_measurement: "°"

  # Radar range as a slider (renders as a slider in the web dashboard
  # and Home Assistant). Any whole-km radius from 5 to 100.
  - platform: template
    name: "Radar Range"
    id: radar_range
    min_value: 5
    max_value: 100
    step: 1
    initial_value: 10
    optimistic: true
    restore_value: true
    mode: slider
    unit_of_measurement: "km"

  # Outer radius: aircraft beyond the ring range but within this radius
  # show as red dots clamped to the edge of the display. The original
  # firmware uses ~133% (ring3 at 3/4 means the outer ring = 4/3 of the
  # labeled range). Set to 100 to disable fringe dots entirely.
  - platform: template
    name: "Outer Radius"
    id: outer_radius_pct
    min_value: 100
    max_value: 200
    step: 5
    initial_value: 133
    optimistic: true
    restore_value: true
    mode: slider
    unit_of_measurement: "%"
    entity_category: config

# Lat/lon as free-text inputs (easier to type a precise coordinate than
# to drag a slider). Parsed to double with atof() wherever they're used.
text:
  - platform: template
    name: "Home Latitude"
    id: home_lat
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ${default_lat}
    entity_category: config

  - platform: template
    name: "Home Longitude"
    id: home_lon
    mode: text
    optimistic: true
    restore_value: true
    initial_value: ${default_lon}
    entity_category: config

select:
  # Runway overlay on/off. The airports themselves are chosen at compile time
  # by build_airports.py (everything within its radius of home); the firmware
  # then draws whichever of those fall inside your current range slider.
  - platform: template
    name: "Runway Overlay"
    id: runway_overlay
    options:
      - "Off"
      - "On"
    initial_option: "On"
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Units"
    id: radar_units
    options:
      - "km"
      - "mi"
    initial_option: "km"
    optimistic: true
    restore_value: true
    entity_category: config

# In-memory aircraft list, refreshed every poll. Not persisted (no need to be).
# Stored as parallel arrays of plain types instead of a custom struct, so
# everything stays in this single yaml with no separate header file.
globals:
  - id: ac_callsign
    type: std::vector<std::string>
    restore_value: false
  - id: ac_hex
    type: std::vector<std::string>
    restore_value: false
  - id: ac_registration
    type: std::vector<std::string>
    restore_value: false
  - id: ac_type
    type: std::vector<std::string>
    restore_value: false
  - id: ac_squawk
    type: std::vector<std::string>
    restore_value: false
  - id: ac_lat
    type: std::vector<double>
    restore_value: false
  - id: ac_lon
    type: std::vector<double>
    restore_value: false
  - id: ac_distance_km
    type: std::vector<double>
    restore_value: false
  - id: ac_bearing_deg
    type: std::vector<double>
    restore_value: false
  - id: ac_has_track
    type: std::vector<bool>
    restore_value: false
  - id: ac_track_deg
    type: std::vector<double>
    restore_value: false
  - id: ac_has_altitude
    type: std::vector<bool>
    restore_value: false
  - id: ac_altitude_ft
    type: std::vector<int>
    restore_value: false
  - id: ac_has_speed
    type: std::vector<bool>
    restore_value: false
  - id: ac_speed_kt
    type: std::vector<double>
    restore_value: false
  - id: ac_has_vrate
    type: std::vector<bool>
    restore_value: false
  - id: ac_vrate_fpm
    type: std::vector<int>
    restore_value: false

  # Runway overlay data. Two parallel vectors keyed by index:
  #   rw_icao[i]  = ICAO label for airport i
  #   rw_lines[i] = flat list of runway endpoint coords for airport i,
  #                 packed as [lat1,lon1,lat2,lon2, lat1,lon1,lat2,lon2, ...]
  # Populated once in on_boot from the pasteable block below.
  - id: rw_icao
    type: std::vector<std::string>
    restore_value: false
  - id: rw_lines
    type: std::vector<std::vector<double>>
    restore_value: false

sensor:
  - platform: template
    name: "Aircraft Count"
    id: aircraft_count
    unit_of_measurement: "aircraft"
    icon: "mdi:airplane"
    accuracy_decimals: 0

# ---------------------------------------------------------------------
# BOOT button: short press cycles range 5 -> 10 -> 15 -> 25 -> 5.
# Long press (3s) factory-resets local settings (lat/lon/range/facing).
# Wi-Fi credentials now come from secrets.yaml at compile time, so there's
# no runtime Wi-Fi credential store left to wipe - factory_reset just
# clears the persisted number/select values above.
# ---------------------------------------------------------------------
button:
  - platform: factory_reset
    id: factory_reset_btn
    name: "Factory Reset"
    entity_category: config

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
    id: boot_button
    name: "Boot Button"
    entity_category: diagnostic
    filters:
      - delayed_on: 10ms
    on_click:
      # Short click: jump to the next range preset above the current
      # slider value (5, 10, 15, 25, 50, 100), wrapping back to 5.
      # Any in-between slider value set from HA/web still works; the
      # button just snaps to the next preset up from wherever you are.
      - min_length: 50ms
        max_length: 2900ms
        then:
          - lambda: |-
              const int presets[] = {5, 10, 15, 25, 50, 100};
              int cur = (int) id(radar_range).state;
              int next = presets[0];
              for (int p : presets) {
                if (p > cur) { next = p; break; }
              }
              auto call = id(radar_range).make_call();
              call.set_value(next);
              call.perform();
      # Long press: 3s - 10s -> factory reset (mirrors original credential wipe)
      - min_length: 3000ms
        max_length: 10000ms
        then:
          - button.press: factory_reset_btn

# ---------------------------------------------------------------------
# Poll adsb.fi every 5s (matches original ~5s cadence) and refresh the list.
# NOTE: adjust JSON field names below if your response differs -
# check the "plane radar" logger tag after flashing to see the raw body.
# ---------------------------------------------------------------------
interval:
  - interval: 5s
    then:
      - http_request.get:
          url: !lambda |-
            char buf[220];
            int range_km = (int) id(radar_range).state;
            // Fetch aircraft out to the outer radius so fringe dots appear.
            int fetch_km = (int)(range_km * id(outer_radius_pct).state / 100.0);
            // adsb.fi's dist parameter is in NAUTICAL MILES, not km.
            int dist_nm = (int) ceil(fetch_km / 1.852);
            snprintf(buf, sizeof(buf),
                     "https://opendata.adsb.fi/api/v3/lat/%.4f/lon/%.4f/dist/%d",
                     atof(id(home_lat).state.c_str()), atof(id(home_lon).state.c_str()), dist_nm);
            return std::string(buf);
          capture_response: true
          max_response_buffer_size: 32kB
          on_response:
            then:
              - lambda: |-
                  // Local geo-math helpers (kept here instead of a header
                  // file, since this is the only place that needs them).
                  auto deg2rad = [](double d) { return d * M_PI / 180.0; };
                  auto rad2deg = [](double r) { return r * 180.0 / M_PI; };
                  auto calc_distance_km = [&](double lat1, double lon1, double lat2, double lon2) -> double {
                    const double R = 6371.0;
                    double dlat = deg2rad(lat2 - lat1);
                    double dlon = deg2rad(lon2 - lon1);
                    double a = sin(dlat / 2) * sin(dlat / 2) +
                               cos(deg2rad(lat1)) * cos(deg2rad(lat2)) * sin(dlon / 2) * sin(dlon / 2);
                    double c = 2 * atan2(sqrt(a), sqrt(1 - a));
                    return R * c;
                  };
                  auto calc_bearing_deg = [&](double lat1, double lon1, double lat2, double lon2) -> double {
                    double phi1 = deg2rad(lat1), phi2 = deg2rad(lat2);
                    double dlon = deg2rad(lon2 - lon1);
                    double y = sin(dlon) * cos(phi2);
                    double x = cos(phi1) * sin(phi2) - sin(phi1) * cos(phi2) * cos(dlon);
                    double brng = rad2deg(atan2(y, x));
                    return fmod(brng + 360.0, 360.0);
                  };

                  id(ac_callsign).clear();
                  id(ac_hex).clear();
                  id(ac_registration).clear();
                  id(ac_type).clear();
                  id(ac_squawk).clear();
                  id(ac_lat).clear();
                  id(ac_lon).clear();
                  id(ac_distance_km).clear();
                  id(ac_bearing_deg).clear();
                  id(ac_has_track).clear();
                  id(ac_track_deg).clear();
                  id(ac_has_altitude).clear();
                  id(ac_altitude_ft).clear();
                  id(ac_has_speed).clear();
                  id(ac_speed_kt).clear();
                  id(ac_has_vrate).clear();
                  id(ac_vrate_fpm).clear();

                  double hlat = atof(id(home_lat).state.c_str());
                  double hlon = atof(id(home_lon).state.c_str());

                  json::parse_json(body, [&](JsonObject root) -> bool {
                    // adsb.fi /api/v2/ wraps the list in "aircraft";
                    // /api/v3/ uses the ADSBExchange-compatible "ac".
                    // Accept either so both endpoint versions work.
                    JsonArray list;
                    if (root["aircraft"].is<JsonArray>()) {
                      list = root["aircraft"].as<JsonArray>();
                    } else if (root["ac"].is<JsonArray>()) {
                      list = root["ac"].as<JsonArray>();
                    } else {
                      ESP_LOGW("plane radar", "unexpected response shape, no 'aircraft' or 'ac' array");
                      return false;
                    }
                    for (JsonObject ac : list) {
                      if (!ac["lat"].is<float>() || !ac["lon"].is<float>()) continue;
                      double alat = ac["lat"].as<double>();
                      double alon = ac["lon"].as<double>();

                      std::string hex = ac["hex"].is<const char*>() ? std::string(ac["hex"].as<const char*>()) : std::string("");

                      std::string callsign = ac["flight"].is<const char*>()
                                                  ? std::string(ac["flight"].as<const char*>())
                                                  : (hex.empty() ? std::string("?????") : hex);
                      // trim whitespace adsb.fi pads callsigns with
                      while (!callsign.empty() && callsign.back() == ' ') callsign.pop_back();

                      id(ac_callsign).push_back(callsign);
                      id(ac_hex).push_back(hex);
                      id(ac_registration).push_back(ac["r"].is<const char*>() ? std::string(ac["r"].as<const char*>()) : std::string(""));
                      id(ac_type).push_back(ac["t"].is<const char*>() ? std::string(ac["t"].as<const char*>()) : std::string(""));
                      id(ac_squawk).push_back(ac["squawk"].is<const char*>() ? std::string(ac["squawk"].as<const char*>()) : std::string(""));
                      id(ac_lat).push_back(alat);
                      id(ac_lon).push_back(alon);
                      id(ac_distance_km).push_back(calc_distance_km(hlat, hlon, alat, alon));
                      id(ac_bearing_deg).push_back(calc_bearing_deg(hlat, hlon, alat, alon));

                      if (ac["alt_baro"].is<int>()) {
                        id(ac_altitude_ft).push_back(ac["alt_baro"].as<int>());
                        id(ac_has_altitude).push_back(true);
                      } else {
                        id(ac_altitude_ft).push_back(0);
                        id(ac_has_altitude).push_back(false);
                      }

                      if (ac["track"].is<float>()) {
                        id(ac_track_deg).push_back(ac["track"].as<double>());
                        id(ac_has_track).push_back(true);
                      } else {
                        id(ac_track_deg).push_back(0);
                        id(ac_has_track).push_back(false);
                      }

                      if (ac["gs"].is<float>()) {
                        id(ac_speed_kt).push_back(ac["gs"].as<double>());
                        id(ac_has_speed).push_back(true);
                      } else {
                        id(ac_speed_kt).push_back(0);
                        id(ac_has_speed).push_back(false);
                      }

                      // adsb.fi reports vertical rate as either baro_rate or geom_rate
                      // depending on what the aircraft's transponder sends.
                      if (ac["baro_rate"].is<int>()) {
                        id(ac_vrate_fpm).push_back(ac["baro_rate"].as<int>());
                        id(ac_has_vrate).push_back(true);
                      } else if (ac["geom_rate"].is<int>()) {
                        id(ac_vrate_fpm).push_back(ac["geom_rate"].as<int>());
                        id(ac_has_vrate).push_back(true);
                      } else {
                        id(ac_vrate_fpm).push_back(0);
                        id(ac_has_vrate).push_back(false);
                      }
                    }
                    return true;
                  });

                  int n = id(ac_callsign).size();
                  ESP_LOGD("plane radar", "tracking %d aircraft", n);
                  id(aircraft_count).publish_state(n);

                  // Publish the full list as one JSON payload. Includes everything
                  // the API gave us; fields the aircraft's transponder didn't send
                  // are simply omitted for that aircraft (no destination airport is
                  // available from ADS-B - "heading_deg" is the closest thing, i.e.
                  // the direction the aircraft is currently flying).
                  std::string mqtt_payload = json::build_json([n](JsonObject root) {
                    root["count"] = n;
                    JsonArray arr = root["aircraft"].to<JsonArray>();
                    for (int i = 0; i < n; i++) {
                      JsonObject o = arr.add<JsonObject>();
                      o["callsign"] = id(ac_callsign)[i];
                      if (!id(ac_hex)[i].empty()) o["hex"] = id(ac_hex)[i];
                      if (!id(ac_registration)[i].empty()) o["registration"] = id(ac_registration)[i];
                      if (!id(ac_type)[i].empty()) o["type"] = id(ac_type)[i];
                      if (!id(ac_squawk)[i].empty()) o["squawk"] = id(ac_squawk)[i];
                      o["lat"] = id(ac_lat)[i];
                      o["lon"] = id(ac_lon)[i];
                      o["distance_km"] = id(ac_distance_km)[i];
                      o["bearing_from_home_deg"] = id(ac_bearing_deg)[i];
                      if (id(ac_has_track)[i]) o["heading_deg"] = id(ac_track_deg)[i];
                      if (id(ac_has_altitude)[i]) o["altitude_ft"] = id(ac_altitude_ft)[i];
                      if (id(ac_has_speed)[i]) o["ground_speed_kt"] = id(ac_speed_kt)[i];
                      if (id(ac_has_vrate)[i]) o["vertical_rate_fpm"] = id(ac_vrate_fpm)[i];
                    }
                  });
                  id(mqtt_client).publish("$(topic_prefix)/${device_name}/aircraft", mqtt_payload, 0, false);

# ---------------------------------------------------------------------
# Display: SPI wiring matches the original board.
#   RST -> GPIO0, CS -> GPIO1, DC -> GPIO10, MOSI -> GPIO3, SCLK -> GPIO4
# ---------------------------------------------------------------------
spi:
  clk_pin: GPIO4
  mosi_pin: GPIO3

color:
  - id: col_bg
    hex: "000000"      # kColorBackground — black
  - id: col_ring
    hex: "006500"      # kColorGrid — dark green
  - id: col_text
    hex: FFFFFF        # kColorLabel — white (callsign + N/S/E/W)
  - id: col_ac
    hex: FF0000        # kColorAircraft — RED (original swaps R/B for BGR panel;
                       # ESPHome's color_order:rgb handles that, so we use true red)
  - id: col_track
    hex: FFFFFF        # kColorTrackVector — white
  - id: col_ac_type
    hex: 5ABEFF        # kColorTagType — light blue
  - id: col_ac_alt
    hex: FFFF00        # kColorTagAltitude — yellow
  - id: col_runway
    hex: 4AAAFF        # kColorRunway — medium blue
  - id: col_rwy_label
    hex: 7BBEFF        # kColorRunwayLabel — lighter blue

font:
  - file: "gfonts://Roboto"
    id: font_label
    size: 12
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto"
    id: font_bezel
    size: 14

display:
  - platform: mipi_spi
    model: GC9A01A
    id: radar_display
    cs_pin: GPIO1
    dc_pin: GPIO10
    reset_pin: GPIO0
    invert_colors: true      # matches original firmware kDisplayInvert = true
    color_order: bgr         # GC9A01 panel is natively BGR; the original firmware
                             # sets rgb_order=true but then manually swaps R/B for
                             # the aircraft color to compensate — proving it's BGR.
    update_interval: 5s
    lambda: |-
      const int cx = 120, cy = 120;
      const int outer_r = 105;

      // Local helper (kept here instead of a header file): converts a
      // bearing + distance into screen x/y for a radar centered at (cx,cy).
      auto polar_to_screen = [&](double bearing, double distance_km, double max_range_km,
                                  int cx, int cy, int px_radius, int &out_x, int &out_y) {
        double clamped = distance_km > max_range_km ? max_range_km : distance_km;
        double r_px = (clamped / max_range_km) * px_radius;
        double theta = (bearing - 90.0) * M_PI / 180.0;  // -90 so 0deg (N) points up
        out_x = cx + (int) round(r_px * cos(theta));
        out_y = cy + (int) round(r_px * sin(theta));
      };

      it.fill(id(col_bg));

      int range_km = (int) id(radar_range).state;
      bool miles = id(radar_units).current_option() == "mi";

      // Rings at 1/4, 1/2, 3/4, full radius (circles are rotation-invariant).
      for (int i = 1; i <= 4; i++) {
        it.circle(cx, cy, outer_r * i / 4, id(col_ring));
      }

      // Screen rotation derived from the direction the user is facing:
      // rot = (360 - facing) mod 360, so the facing direction ends up at
      // the top of the display. Facing 240 (SW) -> rot 120.
      double rot = fmod(360.0 - id(facing_direction).state, 360.0);

      // Crosshairs: draw as two lines through the center at rot and rot+90,
      // instead of fixed horizontal/vertical, so they turn with the display.
      int nx, ny, sx, sy, ex, ey, wx, wy;
      polar_to_screen(fmod(rot + 0.0, 360.0),   outer_r, outer_r, cx, cy, outer_r, nx, ny);
      polar_to_screen(fmod(rot + 180.0, 360.0), outer_r, outer_r, cx, cy, outer_r, sx, sy);
      polar_to_screen(fmod(rot + 90.0, 360.0),  outer_r, outer_r, cx, cy, outer_r, ex, ey);
      polar_to_screen(fmod(rot + 270.0, 360.0), outer_r, outer_r, cx, cy, outer_r, wx, wy);
      it.line(nx, ny, sx, sy, id(col_ring));
      it.line(ex, ey, wx, wy, id(col_ring));

      // Bezel labels N/S/E/W, positioned along the rotated cardinal bearings,
      // pushed slightly past the outer ring so they sit outside it.
      int lnx, lny, lsx, lsy, lex, ley, lwx, lwy;
      polar_to_screen(fmod(rot + 0.0, 360.0),   outer_r + 12, outer_r, cx, cy, outer_r, lnx, lny);
      polar_to_screen(fmod(rot + 180.0, 360.0), outer_r + 12, outer_r, cx, cy, outer_r, lsx, lsy);
      polar_to_screen(fmod(rot + 90.0, 360.0),  outer_r + 12, outer_r, cx, cy, outer_r, lex, ley);
      polar_to_screen(fmod(rot + 270.0, 360.0), outer_r + 12, outer_r, cx, cy, outer_r, lwx, lwy);
      it.print(lnx, lny, id(font_bezel), id(col_text), TextAlign::CENTER, "N");
      it.print(lsx, lsy, id(font_bezel), id(col_text), TextAlign::CENTER, "S");
      it.print(lex, ley, id(font_bezel), id(col_text), TextAlign::CENTER, "E");
      it.print(lwx, lwy, id(font_bezel), id(col_text), TextAlign::CENTER, "W");

      // Range label on the ring-3 (3/4 radius) east spoke, rotated along with everything else.
      int rlx, rly;
      polar_to_screen(fmod(rot + 90.0, 360.0), outer_r * 3 / 4, outer_r, cx, cy, outer_r, rlx, rly);
      char range_label[16];
      if (miles) {
        snprintf(range_label, sizeof(range_label), "%.0fmi", range_km * 0.621371);
      } else {
        snprintf(range_label, sizeof(range_label), "%dkm", range_km);
      }
      it.print(rlx, rly, id(font_label), id(col_text), TextAlign::CENTER, range_label);

      // ----- Runway overlay (drawn under the aircraft dots) -----
      if (id(runway_overlay).state == "On") {
        double hlat = atof(id(home_lat).state.c_str());
        double hlon = atof(id(home_lon).state.c_str());

        // Local great-circle helpers (same math as the fetch lambda).
        auto d2r = [](double d) { return d * M_PI / 180.0; };
        auto r2d = [](double r) { return r * 180.0 / M_PI; };
        auto dist_km = [&](double la1, double lo1, double la2, double lo2) -> double {
          const double R = 6371.0;
          double dla = d2r(la2 - la1), dlo = d2r(lo2 - lo1);
          double a = sin(dla/2)*sin(dla/2) + cos(d2r(la1))*cos(d2r(la2))*sin(dlo/2)*sin(dlo/2);
          return R * 2 * atan2(sqrt(a), sqrt(1-a));
        };
        auto brng = [&](double la1, double lo1, double la2, double lo2) -> double {
          double p1 = d2r(la1), p2 = d2r(la2), dlo = d2r(lo2 - lo1);
          double y = sin(dlo)*cos(p2);
          double x = cos(p1)*sin(p2) - sin(p1)*cos(p2)*cos(dlo);
          return fmod(r2d(atan2(y, x)) + 360.0, 360.0);
        };

        for (size_t ai = 0; ai < id(rw_icao).size(); ai++) {
          auto &coords = id(rw_lines)[ai];
          bool any_on_screen = false;
          int lbl_x = 0, lbl_y = 0;

          // Each runway is 4 consecutive doubles: lat1,lon1,lat2,lon2.
          for (size_t k = 0; k + 3 < coords.size(); k += 4) {
            double la1 = coords[k], lo1 = coords[k+1];
            double la2 = coords[k+2], lo2 = coords[k+3];

            double d1 = dist_km(hlat, hlon, la1, lo1);
            double b1 = fmod(brng(hlat, hlon, la1, lo1) + rot, 360.0);
            double d2 = dist_km(hlat, hlon, la2, lo2);
            double b2 = fmod(brng(hlat, hlon, la2, lo2) + rot, 360.0);

            // Skip runways entirely outside the current display range.
            if (d1 > range_km && d2 > range_km) continue;

            int x1, y1, x2, y2;
            polar_to_screen(b1, d1, range_km, cx, cy, outer_r, x1, y1);
            polar_to_screen(b2, d2, range_km, cx, cy, outer_r, x2, y2);
            it.line(x1, y1, x2, y2, id(col_runway));

            if (!any_on_screen) {
              lbl_x = (x1 + x2) / 2;
              lbl_y = (y1 + y2) / 2;
              any_on_screen = true;
            }
          }

          // One ICAO label per airport, near its first drawn runway.
          if (any_on_screen) {
            it.print(lbl_x, lbl_y - 10, id(font_label), id(col_rwy_label),
                     TextAlign::BOTTOM_CENTER, id(rw_icao)[ai].c_str());
          }
        }
      }

      // Plot aircraft with directional triangles, trajectory lines, and fringe dots.
      int n = id(ac_callsign).size();
      double outer_km = range_km * id(outer_radius_pct).state / 100.0;

      for (int i = 0; i < n; i++) {
        double dist = id(ac_distance_km)[i];
        double screen_bearing = fmod(id(ac_bearing_deg)[i] + rot, 360.0);
        bool in_range = dist <= range_km;
        bool in_fringe = !in_range && dist <= outer_km;

        if (!in_range && !in_fringe) continue;

        int x, y;
        if (in_fringe) {
          // Clamp to the outer ring edge — red dot only, no labels.
          polar_to_screen(screen_bearing, (double)range_km, range_km, cx, cy, outer_r, x, y);
          it.filled_circle(x, y, 2, id(col_ac));
          continue;
        }

        // In-range aircraft: full rendering.
        polar_to_screen(screen_bearing, dist, range_km, cx, cy, outer_r, x, y);

        // The original uses nose_deg (heading) for the triangle direction and
        // track_deg (ground track) for the speed vector. Since adsb.fi only
        // gives us "track" (ground track), we use that for both — visually
        // identical except in strong crosswind.
        double heading_screen = id(ac_has_track)[i]
                                    ? fmod(id(ac_track_deg)[i] + rot, 360.0)
                                    : screen_bearing;

        if (id(ac_has_track)[i]) {
          // Filled triangle: tip points along heading, tail opens behind.
          double h_rad = (heading_screen - 90.0) * M_PI / 180.0;
          const int nose = 5;   // nose length from center
          const int tail = 3;   // tail length behind center
          const int wing = 3;   // half-width of tail

          // Tip (nose)
          int tx = x + (int)(nose * cos(h_rad));
          int ty = y + (int)(nose * sin(h_rad));
          // Base center (behind)
          int bx = x - (int)(tail * cos(h_rad));
          int by = y - (int)(tail * sin(h_rad));
          // Wing points (perpendicular to heading)
          double perp = h_rad + M_PI / 2.0;
          int lx = bx + (int)(wing * cos(perp));
          int ly = by + (int)(wing * sin(perp));
          int rx = bx - (int)(wing * cos(perp));
          int ry = by - (int)(wing * sin(perp));

          it.filled_triangle(tx, ty, lx, ly, rx, ry, id(col_ac));

          // Speed vector line from the nose tip outward along track direction.
          // Length proportional to ground speed: ~1px per 20 kt, capped at 25px.
          if (id(ac_has_speed)[i]) {
            int trail_len = (int)(id(ac_speed_kt)[i] / 20.0);
            if (trail_len > 25) trail_len = 25;
            if (trail_len > 2) {
              int ex = tx + (int)(trail_len * cos(h_rad));
              int ey = ty + (int)(trail_len * sin(h_rad));
              it.line(tx, ty, ex, ey, id(col_track));
            }
          }
        } else {
          // No heading info: plain dot.
          it.filled_circle(x, y, 3, id(col_ac));
        }

        // Tag label block: placed to the left or right of the aircraft
        // symbol (toward center, to avoid edge clipping), matching the
        // original's drawAircraftTag() layout.
        int tag_x;
        auto align = TextAlign::TOP_LEFT;
        if (x < cx) {
          // Aircraft on the left half: tag to the right.
          tag_x = x + 8;
          align = TextAlign::TOP_LEFT;
        } else {
          // Aircraft on the right half: tag to the left.
          tag_x = x - 8;
          align = TextAlign::TOP_RIGHT;
        }
        int ly = y - 15;   // vertically centered around the symbol

        it.print(tag_x, ly, id(font_label), id(col_text), align,
                 id(ac_callsign)[i].c_str());
        ly += 12;

        if (!id(ac_type)[i].empty()) {
          it.print(tag_x, ly, id(font_small), id(col_ac_type), align,
                   id(ac_type)[i].c_str());
          ly += 10;
        }

        if (id(ac_has_altitude)[i]) {
          char alt_buf[16];
          snprintf(alt_buf, sizeof(alt_buf), "%d ft", id(ac_altitude_ft)[i]);
          it.print(tag_x, ly, id(font_small), id(col_ac_alt), align, alt_buf);
        }
      }
